version: '3.8' 
services:
  
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant 
    ports:
      - 6333:6333 # for tcp
      - 6334:6334 # for grcp
    volumes: 
      - qdrant_data:/qdrant/storage
    networks:
      - db_network
    restart: always
  
  elastic_s: 
    image: docker.elastic.co/elasticsearch/elasticsearch:8.7.0 # Trực tiếp dùng image gốc, bỏ qua Dockerfile
    container_name: elastic_s 
    ports: 
      - 9200:9200
    environment:
      - "xpack.security.enabled=false"
      - "discovery.type=single-node"
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks: 
      - db_network
    restart: always
  mongo_db: 
    image: mongo:latest
    container_name: mongo
    restart: always
    ports: 
      - "27018:27017"
    volumes: 
      - mongo_data:/data/db
    networks: 
      - db_network
volumes: 
  qdrant_data:
  es_data:
  mongo_data:
networks:
  db_network:
    driver: bridge